<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>OzelDers.App</title>
    <base href="/" />

    <!-- Google Fonts: Inter (Body) & Outfit (Heading) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@500;600;700&display=swap" rel="stylesheet" />
    
    <!-- OzelDers SharedUI Tasarım Sistemi -->
    <link rel="stylesheet" href="_content/OzelDers.SharedUI/css/app.css" />
    
    <!-- Scoped CSS Bundle (NavMenu.razor.css, SearchBar.razor.css vb.) -->
    <link rel="stylesheet" href="OzelDers.App.styles.css" />
    
    <!-- SweetAlert2 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css" />
    
    <link rel="icon" href="data:," />
    <style>
        /* blazor-error-ui: Varsayılan olarak gizli, hata olursa Blazor gösterir */
        #blazor-error-ui {
            background: lightyellow;
            bottom: 0;
            box-shadow: 0 -1px 2px rgba(0, 0, 0, 0.2);
            display: none;
            left: 0;
            padding: 0.6rem 1.25rem 0.7rem 1.25rem;
            position: fixed;
            width: 100%;
            z-index: 1000;
            text-align: center;
        }
        #blazor-error-ui .dismiss {
            cursor: pointer;
            position: absolute;
            right: 0.75rem;
            top: 0.5rem;
        }
        
        /* WebView2 fix: background-attachment:fixed WebView2'de sorunlu */
        body {
            background-attachment: scroll !important;
        }
    </style>
</head>

<body>

    <div class="status-bar-safe-area"></div>

    <div id="app">Yükleniyor...</div>

    <div id="blazor-error-ui" data-nosnippet>
        Beklenmeyen bir hata oluştu.
        <a href="." class="reload">Yenile</a>
        <span class="dismiss">🗙</span>
    </div>

    <script src="_framework/blazor.webview.js" autostart="false"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="_content/OzelDers.SharedUI/js/interop.js"></script>

</body>
</html>
