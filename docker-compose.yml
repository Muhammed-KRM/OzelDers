services:
  web:
    build:
      context: .
      dockerfile: src/OzelDers.Web/Dockerfile
    ports: ["8080:8080"]
    depends_on: [postgres, redis]
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=ozelders;Username=ozelders_user;Password=${DB_PASSWORD:?DB_PASSWORD is required}

  api:
    build:
      context: .
      dockerfile: src/OzelDers.API/Dockerfile
    ports: ["5001:8080"]
    depends_on: [postgres, redis, rabbitmq]
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=ozelders;Username=ozelders_user;Password=${DB_PASSWORD:?DB_PASSWORD is required}
      - Redis__ConnectionString=redis:6379
      - Jwt__Issuer=OzelDers.API
      - Jwt__Audience=OzelDers.Clients
      - Jwt__Key=${JWT_KEY:?JWT_KEY is required}
      - Encryption__AesKey=${AES_KEY:?AES_KEY is required}
      - AdminSeed__Email=${ADMIN_EMAIL:?ADMIN_EMAIL is required}
      - AdminSeed__Password=${ADMIN_PASSWORD:?ADMIN_PASSWORD is required}

  worker:
    build:
      context: .
      dockerfile: src/OzelDers.Worker/Dockerfile
    depends_on: [postgres, redis, rabbitmq, ollama]
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=ozelders;Username=ozelders_user;Password=${DB_PASSWORD:?DB_PASSWORD is required}
      - Redis__ConnectionString=redis:6379

  nginx:
    image: nginx:alpine
    ports: ["80:80", "443:443"]
    volumes: 
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - uploads_data:/var/www/uploads
    depends_on: [web, api]

  postgres:
    image: postgres:16
    ports: ["5432:5432"]
    volumes: [pgdata:/var/lib/postgresql/data]
    environment:
      POSTGRES_DB: ozelders
      POSTGRES_USER: ozelders_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}

  elasticsearch:
    image: elasticsearch:8.12.0
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=true
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD:?ELASTIC_PASSWORD is required}
      - ES_JAVA_OPTS=-Xms1g -Xmx1g
    ports: ["9200:9200"]
    volumes: [esdata:/usr/share/elasticsearch/data]

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]

  rabbitmq:
    image: rabbitmq:3-management
    ports: ["5672:5672", "15672:15672"]

  ollama:
    image: ollama/ollama:latest
    ports: ["11434:11434"]
    volumes: [ollama_data:/root/.ollama]
    environment:
      - OLLAMA_KEEP_ALIVE=24h

volumes:
  pgdata:
  esdata:
  uploads_data:
  ollama_data:
